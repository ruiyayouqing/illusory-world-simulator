# 太虚幻境 云服务版 — Nginx 反向代理配置
# 将此文件复制到 /etc/nginx/sites-available/taiwuyunjing
# 然后 ln -s /etc/nginx/sites-available/taiwuyunjing /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name _;  # 无域名，匹配所有

    # 客户端上传文件大小（世界书/设定文件上传）
    client_max_body_size 20M;

    # 代理到 Uvicorn
    location / {
        proxy_pass http://127.0.0.1:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket 代理
    location /ws/ {
        proxy_pass http://127.0.0.1:8004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # 静态资源缓存
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://127.0.0.1:8004;
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, no-transform";
    }

    # 禁止访问敏感文件
    location ~ /\.(env|secret_key|jwt_secret|access_token) {
        deny all;
        return 404;
    }
    location ~ \.(db|sqlite|sqlite3)$ {
        deny all;
        return 404;
    }
}
