<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太虚幻境 · 管理后台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0f;
  --panel: rgba(17, 17, 32, 0.85);
  --gold: #c9a96e;
  --gold-bright: #e8c89a;
  --text: #e0d5c1;
  --text-dim: #8a7f6d;
  --border: rgba(201, 169, 110, 0.3);
  --red: #c94545;
  --green: #5cb85c;
  --blue: #4a90d9;
}
body {
  background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 100%);
  color: var(--text);
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  min-height: 100vh;
}
/* 顶部栏 */
.topbar {
  background: rgba(17, 17, 32, 0.95);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(10px);
}
.topbar-title {
  font-size: 20px; font-weight: 700; color: var(--gold);
  letter-spacing: 2px;
}
.topbar-right { display: flex; align-items: center; gap: 16px; }
.topbar-btn {
  padding: 8px 16px; background: transparent;
  border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); cursor: pointer; font-size: 14px; transition: all 0.3s;
}
.topbar-btn:hover { border-color: var(--gold); color: var(--gold); }
/* 主体 */
.main { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }
/* 统计卡片 */
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px; margin-bottom: 32px;
}
.stat-card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px;
  backdrop-filter: blur(10px);
}
.stat-card-label { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }
.stat-card-value { font-size: 28px; font-weight: 700; color: var(--gold-bright); }
.stat-card-sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
/* 面板 */
.panel {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; margin-bottom: 24px;
  backdrop-filter: blur(10px);
}
.panel-title {
  font-size: 16px; font-weight: 600; color: var(--gold);
  margin-bottom: 16px; padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.panel-title-actions { display: flex; gap: 8px; }
/* 表格 */
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid rgba(201, 169, 110, 0.1); font-size: 14px; }
th { color: var(--text-dim); font-weight: 500; font-size: 13px; }
tr:hover { background: rgba(201, 169, 110, 0.03); }
/* 按钮 */
.btn {
  padding: 8px 16px; border: none; border-radius: 6px;
  cursor: pointer; font-size: 13px; transition: all 0.3s;
}
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-danger { background: rgba(201, 69, 69, 0.2); color: #ff8080; border: 1px solid rgba(201, 69, 69, 0.3); }
.btn-danger:hover { background: rgba(201, 69, 69, 0.3); }
.btn-success { background: rgba(92, 184, 92, 0.2); color: #80d080; border: 1px solid rgba(92, 184, 92, 0.3); }
.btn-success:hover { background: rgba(92, 184, 92, 0.3); }
.btn-primary { background: var(--gold); color: #1a1a2e; }
.btn-primary:hover { background: var(--gold-bright); }
.btn-warning { background: rgba(255, 165, 0, 0.2); color: #ffb84d; border: 1px solid rgba(255, 165, 0, 0.3); }
.btn-warning:hover { background: rgba(255, 165, 0, 0.3); }
/* 表单 */
.form-row {
  display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
}
.form-row label {
  min-width: 160px; font-size: 14px; color: var(--text-dim);
}
.form-row input, .form-row select {
  flex: 1; padding: 8px 12px;
  background: rgba(0,0,0,0.3); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-size: 14px;
}
.form-row input:focus, .form-row select:focus {
  outline: none; border-color: var(--gold);
}
/* 开关 */
.switch {
  position: relative; width: 44px; height: 24px;
  background: rgba(0,0,0,0.4); border-radius: 12px; cursor: pointer;
  transition: background 0.3s;
}
.switch.on { background: var(--green); }
.switch::after {
  content: ""; position: absolute; top: 3px; left: 3px;
  width: 18px; height: 18px; background: #fff; border-radius: 50%;
  transition: transform 0.3s;
}
.switch.on::after { transform: translateX(20px); }
/* 标签 */
.tag {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 12px; margin-right: 4px;
}
.tag-admin { background: rgba(201, 169, 110, 0.2); color: var(--gold); }
.tag-guest { background: rgba(120, 80, 200, 0.2); color: #b89dff; }
.tag-active { background: rgba(92, 184, 92, 0.2); color: #80d080; }
.tag-disabled { background: rgba(201, 69, 69, 0.2); color: #ff8080; }
/* Toast */
.toast-container {
  position: fixed; top: 80px; right: 24px; z-index: 1000;
}
.toast-msg {
  padding: 12px 20px; border-radius: 8px; margin-bottom: 8px;
  background: var(--panel); border: 1px solid var(--border);
  animation: slideIn 0.3s;
}
.toast-error { border-color: var(--red); color: #ff8080; }
.toast-success { border-color: var(--green); color: #80d080; }
.toast-info { border-color: var(--gold); color: var(--gold-bright); }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
/* 响应式 */
@media (max-width: 768px) {
  .main { padding: 16px; }
  .stats-grid { grid-template-columns: 1fr; }
  .form-row { flex-direction: column; align-items: stretch; }
  .form-row label { min-width: 0; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">太虚幻境 · 管理后台</div>
  <div class="topbar-right">
    <button class="topbar-btn" onclick="location.href='/game'">🎮 进入游戏</button>
    <button class="topbar-btn" onclick="doLogout()">🚪 退出登录</button>
  </div>
</div>

<div class="main">
  <!-- 统计概览 -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card">
      <div class="stat-card-label">总用户数</div>
      <div class="stat-card-value" id="statTotalUsers">--</div>
      <div class="stat-card-sub" id="statUsersSub">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">在线会话</div>
      <div class="stat-card-value" id="statActiveSessions">--</div>
      <div class="stat-card-sub" id="statSessionsSub">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">排队人数</div>
      <div class="stat-card-value" id="statQueue">--</div>
      <div class="stat-card-sub">等待中的用户</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">引擎池</div>
      <div class="stat-card-value" id="statEngines">--</div>
      <div class="stat-card-sub" id="statEnginesSub">--</div>
    </div>
  </div>

  <!-- 系统设置 -->
  <div class="panel">
    <div class="panel-title">
      <span>⚙️ 系统设置</span>
      <div class="panel-title-actions">
        <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
      </div>
    </div>
    <div class="form-row">
      <label>最大并发用户</label>
      <input type="number" id="settingMaxConcurrent" min="1" max="100" value="12">
    </div>
    <div class="form-row">
      <label>会话超时（分钟）</label>
      <input type="number" id="settingTimeout" min="1" max="1440" value="30">
    </div>
    <div class="form-row">
      <label>每日轮数上限</label>
      <input type="number" id="settingDailyLimit" min="1" max="999" value="3">
    </div>
    <div class="form-row">
      <label>启用配额限制</label>
      <div class="switch" id="settingQuotaEnabled" onclick="toggleSwitch(this)">
        <input type="hidden" value="0">
      </div>
      <span style="font-size:13px;color:var(--text-dim);margin-left:8px">
        关闭后用户轮数不受限制
      </span>
    </div>
  </div>

  <!-- API 配置 -->
  <div class="panel">
    <div class="panel-title">
      <span>🔑 API 配置</span>
      <div class="panel-title-actions">
        <button class="btn btn-primary" onclick="saveApiConfig()">保存配置</button>
      </div>
    </div>
    <div class="form-row">
      <label>主力模型 API Key</label>
      <input type="text" id="apiLlmKey" placeholder="sk-..." style="flex:1">
      <button class="btn btn-sm" onclick="toggleApiKeyVisibility('apiLlmKey')" style="margin-left:8px">👁</button>
    </div>
    <div class="form-row">
      <label>主力模型 Base URL</label>
      <input type="text" id="apiLlmBaseUrl" placeholder="https://api.example.com/v1">
    </div>
    <div class="form-row">
      <label>主力模型名称</label>
      <input type="text" id="apiLlmModel" placeholder="gpt-4o-mini">
    </div>
    <div class="form-row" style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
      <label>图片生成 API Key</label>
      <input type="text" id="apiImageKey" placeholder="sk-..." style="flex:1">
      <button class="btn btn-sm" onclick="toggleApiKeyVisibility('apiImageKey')" style="margin-left:8px">👁</button>
    </div>
    <div class="form-row">
      <label>图片生成 Base URL</label>
      <input type="text" id="apiImageBaseUrl" placeholder="https://api.siliconflow.cn/v1/images/generations">
    </div>
    <div class="form-row">
      <label>图片生成模型</label>
      <input type="text" id="apiImageModel" placeholder="Kwai-Kolors/Kolors">
    </div>
    <div class="form-row" style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
      <label>向量模型 API Key</label>
      <input type="text" id="apiEmbeddingKey" placeholder="sk-..." style="flex:1">
      <button class="btn btn-sm" onclick="toggleApiKeyVisibility('apiEmbeddingKey')" style="margin-left:8px">👁</button>
    </div>
    <div class="form-row">
      <label>向量模型 Base URL</label>
      <input type="text" id="apiEmbeddingBaseUrl" placeholder="https://api.siliconflow.cn/v1">
    </div>
    <div class="form-row">
      <label>向量模型名称</label>
      <input type="text" id="apiEmbeddingModel" placeholder="BAAI/bge-m3">
    </div>
    <div style="margin-top:12px;font-size:13px;color:var(--text-dim)">
      ⚠️ API Key 保存后会加密存储，页面刷新后显示为脱敏值（如 sk-***xxx）<br>
      💡 向量模型用于游戏记忆检索，不配置将回退到本地哈希嵌入（仅供测试，记忆质量较低）
    </div>
  </div>

  <!-- 在线会话 -->
  <div class="panel">
    <div class="panel-title">
      <span>🟢 在线会话</span>
      <div class="panel-title-actions">
        <button class="btn btn-sm" onclick="loadSessions()">刷新</button>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>用户名</th>
          <th>类型</th>
          <th>开始时间</th>
          <th>剩余时间</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="sessionsBody">
        <tr><td colspan="5" style="text-align:center;color:var(--text-dim)">暂无在线会话</td></tr>
      </tbody>
    </table>
  </div>

  <!-- 用户管理 -->
  <div class="panel">
    <div class="panel-title">
      <span>👥 用户管理</span>
      <div class="panel-title-actions">
        <button class="btn btn-sm" onclick="loadUsers()">刷新</button>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>用户名</th>
          <th>类型</th>
          <th>状态</th>
          <th>今日轮数</th>
          <th>总轮数</th>
          <th>注册时间</th>
          <th>最后登录</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="usersBody">
        <tr><td colspan="8" style="text-align:center;color:var(--text-dim)">加载中...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ===== JWT Token =====
function getToken() { return localStorage.getItem('taiwu_token') || ''; }
function getCurrentUser() {
  try { return JSON.parse(localStorage.getItem('taiwu_user') || '{}'); } catch(e) { return {}; }
}

// 检查管理员权限
(function checkAdmin() {
  var token = getToken();
  var user = getCurrentUser();
  if (!token || !user.is_admin) {
    localStorage.clear();
    location.href = '/';
    return;
  }
})();

async function api(method, path, body) {
  var opts = { method: method, headers: { 'Content-Type': 'application/json' } };
  var token = getToken();
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body && method !== 'GET') opts.body = JSON.stringify(body);
  try {
    var resp = await fetch(path, opts);
    if (resp.status === 401) { localStorage.clear(); location.href = '/'; return null; }
    if (resp.status === 403) { toast('无管理员权限', 'error'); return null; }
    return await resp.json();
  } catch(e) {
    toast('请求失败: ' + e.message, 'error');
    return null;
  }
}

function toast(msg, type) {
  type = type || 'info';
  var container = document.getElementById('toastContainer');
  var el = document.createElement('div');
  el.className = 'toast-msg toast-' + type;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(function() {
    el.style.opacity = '0';
    el.style.transition = 'opacity .3s';
    setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 300);
  }, 3000);
}

function doLogout() {
  if (!confirm('确定退出登录？')) return;
  api('POST', '/api/auth/logout').finally(function() {
    localStorage.clear();
    location.href = '/';
  });
}

function toggleSwitch(el) {
  el.classList.toggle('on');
  el.querySelector('input').value = el.classList.contains('on') ? '1' : '0';
}

// ===== API Key 显隐切换 =====
function toggleApiKeyVisibility(inputId) {
  var input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
  } else {
    input.type = 'password';
  }
}

// ===== 加载 API 配置 =====
async function loadApiConfig() {
  var data = await api('GET', '/api/config/raw');
  if (!data) return;

  var llm = data.llm || {};
  document.getElementById('apiLlmKey').value = llm.api_key || '';
  document.getElementById('apiLlmKey').dataset.original = llm.api_key || '';
  document.getElementById('apiLlmBaseUrl').value = llm.base_url || '';
  document.getElementById('apiLlmModel').value = llm.model_name || '';

  var image = data.image || {};
  document.getElementById('apiImageKey').value = image.api_key || '';
  document.getElementById('apiImageKey').dataset.original = image.api_key || '';
  document.getElementById('apiImageBaseUrl').value = image.base_url || '';
  document.getElementById('apiImageModel').value = image.model_name || '';

  var embedding = data.embedding || {};
  document.getElementById('apiEmbeddingKey').value = embedding.api_key || '';
  document.getElementById('apiEmbeddingKey').dataset.original = embedding.api_key || '';
  document.getElementById('apiEmbeddingBaseUrl').value = embedding.base_url || '';
  document.getElementById('apiEmbeddingModel').value = embedding.model_name || '';

  // 如果 API Key 已存在，显示为密码类型（脱敏）
  if (llm.api_key && llm.api_key.indexOf('***') >= 0) {
    document.getElementById('apiLlmKey').type = 'password';
  }
  if (image.api_key && image.api_key.indexOf('***') >= 0) {
    document.getElementById('apiImageKey').type = 'password';
  }
  if (embedding.api_key && embedding.api_key.indexOf('***') >= 0) {
    document.getElementById('apiEmbeddingKey').type = 'password';
  }
}

// ===== 保存 API 配置 =====
async function saveApiConfig() {
  var llmKey = document.getElementById('apiLlmKey').value.trim();
  var llmBaseUrl = document.getElementById('apiLlmBaseUrl').value.trim();
  var llmModel = document.getElementById('apiLlmModel').value.trim();
  var imageKey = document.getElementById('apiImageKey').value.trim();
  var imageBaseUrl = document.getElementById('apiImageBaseUrl').value.trim();
  var imageModel = document.getElementById('apiImageModel').value.trim();
  var embeddingKey = document.getElementById('apiEmbeddingKey').value.trim();
  var embeddingBaseUrl = document.getElementById('apiEmbeddingBaseUrl').value.trim();
  var embeddingModel = document.getElementById('apiEmbeddingModel').value.trim();

  // 如果显示的是脱敏值（含 ***），使用原始值（如果用户没修改）
  var llmKeyOriginal = document.getElementById('apiLlmKey').dataset.original || '';
  var imageKeyOriginal = document.getElementById('apiImageKey').dataset.original || '';
  var embeddingKeyOriginal = document.getElementById('apiEmbeddingKey').dataset.original || '';
  if (llmKey.indexOf('***') >= 0 && llmKeyOriginal) {
    llmKey = llmKeyOriginal;
  }
  if (imageKey.indexOf('***') >= 0 && imageKeyOriginal) {
    imageKey = imageKeyOriginal;
  }
  if (embeddingKey.indexOf('***') >= 0 && embeddingKeyOriginal) {
    embeddingKey = embeddingKeyOriginal;
  }

  if (!llmKey) {
    toast('请输入主力模型 API Key', 'error');
    return;
  }

  var body = {
    llm_api_key: llmKey,
    llm_base_url: llmBaseUrl || 'https://api.openai.com/v1',
    llm_model: llmModel || 'gpt-4o-mini',
    llm_max_tokens: 0,
    cheap_llm_enabled: false,
    cheap_llm_api_key: '',
    cheap_llm_base_url: '',
    cheap_llm_model: '',
    dialogue_llm_enabled: false,
    dialogue_llm_api_key: '',
    dialogue_llm_base_url: '',
    dialogue_llm_model: '',
    image_api_key: imageKey,
    image_base_url: imageBaseUrl || 'https://api.siliconflow.cn/v1/images/generations',
    image_model: imageModel || 'Kwai-Kolors/Kolors',
    embedding_api_key: embeddingKey,
    embedding_base_url: embeddingBaseUrl || 'https://api.siliconflow.cn/v1',
    embedding_model: embeddingModel || 'BAAI/bge-m3',
    theme: 'dark',
    accent_color: '#c9a96e',
    bg_color: '#0a0a0f',
    text_color: '#e0d5c1',
    panel_bg: '#111120',
    font_size: 'medium',
    fixed_prompt: '',
    fixed_prompt_enabled: true,
    strip_gray_narrative: true,
    npc_info_visibility: 'immersive',
    economy_enabled: false,
    narrative_max_chars: 1000,
    streaming_enabled: true,
    action_validation_enabled: true,
    v10: {}
  };

  var result = await api('POST', '/api/full-settings', body);
  if (result && result.status === 'ok') {
    toast('API 配置已保存', 'success');
    loadApiConfig(); // 刷新显示脱敏值
  } else if (result) {
    toast(result.error || '保存失败', 'error');
  }
}

function formatTime(timestamp) {
  if (!timestamp) return '--';
  var d = new Date(timestamp * 1000);
  return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

function formatDateTime(dateStr) {
  if (!dateStr) return '--';
  return dateStr.replace('T', ' ').substring(0, 16);
}

// ===== 加载统计 =====
async function loadStats() {
  var data = await api('GET', '/api/admin/stats');
  if (!data) return;

  document.getElementById('statTotalUsers').textContent = data.users.total;
  document.getElementById('statUsersSub').textContent =
    '注册 ' + data.users.real + ' · 游客 ' + data.users.guest + ' · 禁用 ' + data.users.disabled;

  document.getElementById('statActiveSessions').textContent = data.sessions.active;
  document.getElementById('statSessionsSub').textContent = '上限 ' + data.sessions.max;

  document.getElementById('statQueue').textContent = data.sessions.queued;

  document.getElementById('statEngines').textContent = data.engines.total;
  document.getElementById('statEnginesSub').textContent = '上限 ' + data.engines.max;

  // 同步设置
  var s = data.settings || {};
  if (s.max_concurrent_users) document.getElementById('settingMaxConcurrent').value = s.max_concurrent_users;
  if (s.session_timeout_minutes) document.getElementById('settingTimeout').value = s.session_timeout_minutes;
  if (s.daily_turn_limit) document.getElementById('settingDailyLimit').value = s.daily_turn_limit;
  var quotaSw = document.getElementById('settingQuotaEnabled');
  if (s.quota_enabled === '1') quotaSw.classList.add('on');
  else quotaSw.classList.remove('on');
  quotaSw.querySelector('input').value = s.quota_enabled || '0';
}

// ===== 加载会话 =====
async function loadSessions() {
  var data = await api('GET', '/api/admin/sessions');
  if (!data) return;
  var body = document.getElementById('sessionsBody');
  if (!data.sessions || data.sessions.length === 0) {
    body.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-dim)">暂无在线会话</td></tr>';
    return;
  }
  body.innerHTML = data.sessions.map(function(s) {
    var min = Math.floor((s.remaining_time || 0) / 60);
    var sec = (s.remaining_time || 0) % 60;
    return '<tr>' +
      '<td>' + (s.username || s.user_id) + '</td>' +
      '<td>' + (s.is_guest ? '<span class="tag tag-guest">游客</span>' : '<span class="tag tag-active">注册</span>') + '</td>' +
      '<td>' + formatTime(s.start_time) + '</td>' +
      '<td>' + min + ':' + (sec < 10 ? '0' : '') + sec + '</td>' +
      '<td><button class="btn btn-sm btn-warning" onclick="kickUser(\'' + s.user_id + '\')">踢出</button></td>' +
      '</tr>';
  }).join('');
}

// ===== 加载用户 =====
async function loadUsers() {
  var data = await api('GET', '/api/admin/users');
  if (!data) return;
  var body = document.getElementById('usersBody');
  if (!data.users || data.users.length === 0) {
    body.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text-dim)">暂无用户</td></tr>';
    return;
  }
  body.innerHTML = data.users.map(function(u) {
    var tags = '';
    if (u.is_admin) tags += '<span class="tag tag-admin">管理员</span>';
    if (u.is_guest) tags += '<span class="tag tag-guest">游客</span>';
    if (!u.is_admin && !u.is_guest) tags += '<span class="tag tag-active">注册</span>';
    var statusTag = u.is_active ?
      '<span class="tag tag-active">启用</span>' :
      '<span class="tag tag-disabled">禁用</span>';
    var actionBtn = '';
    if (!u.is_admin) {
      if (u.is_active) {
        actionBtn = '<button class="btn btn-sm btn-danger" onclick="toggleUser(\'' + u.id + '\')">禁用</button>';
      } else {
        actionBtn = '<button class="btn btn-sm btn-success" onclick="toggleUser(\'' + u.id + '\')">启用</button>';
      }
    }
    return '<tr>' +
      '<td>' + u.username + '</td>' +
      '<td>' + tags + '</td>' +
      '<td>' + statusTag + '</td>' +
      '<td>' + (u.today_turns || 0) + '</td>' +
      '<td>' + (u.total_turns || 0) + '</td>' +
      '<td>' + formatDateTime(u.created_at) + '</td>' +
      '<td>' + formatDateTime(u.last_login) + '</td>' +
      '<td>' + actionBtn + '</td>' +
      '</tr>';
  }).join('');
}

// ===== 操作 =====
async function toggleUser(userId) {
  var data = await api('POST', '/api/admin/users/' + userId + '/toggle');
  if (data && data.status === 'ok') {
    toast('操作成功', 'success');
    loadUsers();
    loadStats();
  } else if (data) {
    toast(data.error || '操作失败', 'error');
  }
}

async function kickUser(userId) {
  if (!confirm('确定踢出该用户？')) return;
  var data = await api('POST', '/api/admin/users/' + userId + '/kick');
  if (data && data.status === 'ok') {
    toast('已踢出', 'success');
    loadSessions();
  }
}

async function saveSettings() {
  var quotaSw = document.getElementById('settingQuotaEnabled');
  var body = {
    max_concurrent_users: parseInt(document.getElementById('settingMaxConcurrent').value),
    session_timeout_minutes: parseInt(document.getElementById('settingTimeout').value),
    daily_turn_limit: parseInt(document.getElementById('settingDailyLimit').value),
    quota_enabled: quotaSw.classList.contains('on')
  };
  var data = await api('POST', '/api/admin/settings', body);
  if (data && data.status === 'ok') {
    toast('设置已保存', 'success');
    loadStats();
  } else if (data) {
    toast(data.error || '保存失败', 'error');
  }
}

// ===== 自动刷新 =====
loadStats();
loadApiConfig();
loadSessions();
loadUsers();
setInterval(function() {
  loadStats();
  loadSessions();
}, 10000);
</script>
