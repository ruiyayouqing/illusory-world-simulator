<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太虚幻境 · 虚拟世界人生模拟器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0f;
  --panel: rgba(17, 17, 32, 0.85);
  --gold: #c9a96e;
  --gold-bright: #e8c89a;
  --text: #e0d5c1;
  --text-dim: #8a7f6d;
  --border: rgba(201, 169, 110, 0.3);
  --red: #c94545;
  --green: #5cb85c;
}
body {
  background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 100%);
  color: var(--text);
  font-family: "PingFang SC", "Microsoft YaHei", "Source Han Sans CN", sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
/* 星空背景 */
.stars-bg {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 0; pointer-events: none;
}
.star {
  position: absolute; background: #fff; border-radius: 50%;
  animation: twinkle 3s infinite ease-in-out;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 0.9; transform: scale(1.3); }
}
/* 流光线条 */
.aurora {
  position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
  background: conic-gradient(from 0deg at 50% 50%,
    transparent 0deg, rgba(201, 169, 110, 0.05) 90deg,
    transparent 180deg, rgba(120, 80, 200, 0.04) 270deg, transparent 360deg);
  animation: rotate 40s linear infinite;
  z-index: 0; pointer-events: none;
}
@keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* 中央内容 */
.container {
  position: relative; z-index: 10;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.card {
  background: var(--panel);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 48px 40px;
  width: 100%; max-width: 420px;
  box-shadow: 0 0 60px rgba(201, 169, 110, 0.08), inset 0 0 30px rgba(0,0,0,0.3);
  position: relative;
  animation: fadeInUp 0.8s ease;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
.card::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  border-radius: 16px 16px 0 0;
}
/* 标题 */
.brand { text-align: center; margin-bottom: 36px; }
.brand-title {
  font-size: 32px; font-weight: 700;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-bright) 50%, var(--gold) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 4px;
  margin-bottom: 8px;
}
.brand-sub {
  font-size: 13px; color: var(--text-dim); letter-spacing: 6px;
}
.brand-divider {
  width: 60px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 16px auto 0;
}
/* Tab 切换 */
.tabs { display: flex; margin-bottom: 28px; border-bottom: 1px solid var(--border); }
.tab {
  flex: 1; padding: 12px; text-align: center; cursor: pointer;
  color: var(--text-dim); font-size: 15px; transition: all 0.3s;
  border-bottom: 2px solid transparent;
}
.tab.active {
  color: var(--gold); border-bottom-color: var(--gold);
}
/* 表单 */
.form-group { margin-bottom: 20px; }
.form-group label {
  display: block; font-size: 13px; color: var(--text-dim);
  margin-bottom: 8px; letter-spacing: 1px;
}
.input-wrap {
  position: relative;
}
.input-wrap input {
  width: 100%; padding: 12px 16px 12px 40px;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text); font-size: 15px;
  transition: all 0.3s;
}
.input-wrap input:focus {
  outline: none; border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.1);
}
.input-wrap input::placeholder { color: #555; }
.input-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  width: 18px; height: 18px; opacity: 0.5;
}
/* 按钮 */
.btn {
  width: 100%; padding: 14px;
  border: none; border-radius: 8px;
  font-size: 16px; font-weight: 600; cursor: pointer;
  transition: all 0.3s; letter-spacing: 2px;
}
.btn-primary {
  background: linear-gradient(135deg, var(--gold) 0%, #b8975a 100%);
  color: #1a1a2e;
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(201, 169, 110, 0.3);
}
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.btn-ghost {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
}
.btn-ghost:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(201, 169, 110, 0.05);
}
.btn-guest {
  background: linear-gradient(135deg, rgba(120, 80, 200, 0.3), rgba(80, 120, 200, 0.3));
  border: 1px solid rgba(150, 120, 220, 0.4);
  color: var(--text);
}
.btn-guest:hover {
  background: linear-gradient(135deg, rgba(120, 80, 200, 0.5), rgba(80, 120, 200, 0.5));
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(120, 80, 200, 0.2);
}
.form-divider {
  display: flex; align-items: center; margin: 24px 0;
  color: var(--text-dim); font-size: 12px;
}
.form-divider::before, .form-divider::after {
  content: ""; flex: 1; height: 1px; background: var(--border);
}
.form-divider span { padding: 0 12px; }
/* 提示信息 */
.alert {
  padding: 12px 16px; border-radius: 8px; margin-bottom: 20px;
  font-size: 14px; display: none;
}
.alert.show { display: block; animation: shake 0.4s; }
.alert-error {
  background: rgba(201, 69, 69, 0.15);
  border: 1px solid rgba(201, 69, 69, 0.4);
  color: #ff8080;
}
.alert-info {
  background: rgba(201, 169, 110, 0.1);
  border: 1px solid rgba(201, 169, 110, 0.3);
  color: var(--gold-bright);
}
.alert-warning {
  background: rgba(255, 165, 0, 0.1);
  border: 1px solid rgba(255, 165, 0, 0.3);
  color: #ffb84d;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}
/* 排队遮罩 */
.queue-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(10, 10, 15, 0.95);
  display: none; align-items: center; justify-content: center;
  z-index: 1000;
}
.queue-overlay.show { display: flex; }
.queue-box {
  text-align: center; padding: 40px;
}
.queue-spinner {
  width: 80px; height: 80px;
  border: 3px solid rgba(201, 169, 110, 0.2);
  border-top-color: var(--gold);
  border-radius: 50%;
  margin: 0 auto 24px;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.queue-text {
  font-size: 20px; color: var(--gold-bright); margin-bottom: 8px;
}
.queue-sub {
  font-size: 14px; color: var(--text-dim);
}
/* 页脚 */
.footer {
  position: fixed; bottom: 16px; left: 0; right: 0;
  text-align: center; font-size: 12px; color: var(--text-dim);
  z-index: 10;
}
/* 响应式 */
@media (max-width: 480px) {
  .card { padding: 32px 24px; }
  .brand-title { font-size: 26px; }
}
</style>
</head>
<body>

<div class="aurora"></div>
<div class="stars-bg" id="starsBg"></div>

<div class="container">
  <div class="card">
    <div class="brand">
      <div class="brand-title">太虚幻境</div>
      <div class="brand-sub">虚拟世界人生模拟器</div>
      <div class="brand-divider"></div>
    </div>

    <div id="alertBox" class="alert"></div>

    <div class="tabs">
      <div class="tab active" id="tabLogin" onclick="switchTab('login')">登 录</div>
      <div class="tab" id="tabRegister" onclick="switchTab('register')">注 册</div>
    </div>

    <!-- 登录表单 -->
    <form id="loginForm" onsubmit="return doLogin(event)">
      <div class="form-group">
        <label>用户名</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input type="text" id="loginUsername" placeholder="请输入用户名" autocomplete="username" required>
        </div>
      </div>
      <div class="form-group">
        <label>密码</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" id="loginBtn">进 入 幻 境</button>
    </form>

    <!-- 注册表单 -->
    <form id="registerForm" onsubmit="return doRegister(event)" style="display:none;">
      <div class="form-group">
        <label>用户名</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input type="text" id="regUsername" placeholder="2-32位字符" autocomplete="username" required minlength="2" maxlength="32">
        </div>
      </div>
      <div class="form-group">
        <label>密码</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="regPassword" placeholder="至少6位" autocomplete="new-password" required minlength="6" maxlength="128">
        </div>
      </div>
      <div class="form-group">
        <label>确认密码</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="regPassword2" placeholder="再次输入密码" autocomplete="new-password" required minlength="6">
        </div>
      </div>
      <button type="submit" class="btn btn-primary" id="registerBtn">创 建 账 号</button>
    </form>

    <div class="form-divider"><span>或</span></div>

    <button class="btn btn-guest" id="guestBtn" onclick="doGuestLogin()">游 客 体 验</button>
  </div>
</div>

<!-- 排队遮罩 -->
<div class="queue-overlay" id="queueOverlay">
  <div class="queue-box">
    <div class="queue-spinner"></div>
    <div class="queue-text" id="queueText">正在排队...</div>
    <div class="queue-sub" id="queueSub">请耐心等待</div>
  </div>
</div>

<div class="footer">太虚幻境 · 云服务版 · 体验时长 30 分钟</div>

<script>
// ===== 星空背景 =====
(function initStars() {
  var bg = document.getElementById('starsBg');
  var count = 80;
  for (var i = 0; i < count; i++) {
    var s = document.createElement('div');
    s.className = 'star';
    var size = Math.random() * 2 + 1;
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDelay = Math.random() * 3 + 's';
    s.style.animationDuration = (Math.random() * 3 + 2) + 's';
    bg.appendChild(s);
  }
})();

// ===== 工具函数 =====
function showAlert(msg, type) {
  type = type || 'error';
  var box = document.getElementById('alertBox');
  box.className = 'alert alert-' + type + ' show';
  box.textContent = msg;
  setTimeout(function() { box.className = 'alert'; }, 5000);
}

function setBtnLoading(btn, loading) {
  if (loading) {
    btn.dataset.origText = btn.textContent;
    btn.disabled = true;
    btn.textContent = '处理中...';
  } else {
    btn.disabled = false;
    btn.textContent = btn.dataset.origText || btn.textContent;
  }
}

// ===== Tab 切换 =====
function switchTab(tab) {
  var loginForm = document.getElementById('loginForm');
  var regForm = document.getElementById('registerForm');
  var tabLogin = document.getElementById('tabLogin');
  var tabReg = document.getElementById('tabRegister');
  document.getElementById('alertBox').className = 'alert';
  if (tab === 'login') {
    loginForm.style.display = '';
    regForm.style.display = 'none';
    tabLogin.classList.add('active');
    tabReg.classList.remove('active');
  } else {
    loginForm.style.display = 'none';
    regForm.style.display = '';
    tabLogin.classList.remove('active');
    tabReg.classList.add('active');
  }
}

// ===== API 调用 =====
async function apiCall(path, body) {
  try {
    var resp = await fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    return await resp.json();
  } catch(e) {
    return { error: '网络错误: ' + e.message };
  }
}

// ===== 保存 token =====
function saveToken(token, user, quota) {
  localStorage.setItem('taiwu_token', token);
  localStorage.setItem('taiwu_user', JSON.stringify(user));
  if (quota) localStorage.setItem('taiwu_quota', JSON.stringify(quota));
}

// ===== 登录 =====
async function doLogin(event) {
  event.preventDefault();
  var btn = document.getElementById('loginBtn');
  setBtnLoading(btn, true);
  var username = document.getElementById('loginUsername').value.trim();
  var password = document.getElementById('loginPassword').value;
  var result = await apiCall('/api/auth/login', { username: username, password: password });
  setBtnLoading(btn, false);

  if (result.error) {
    showAlert(result.error, 'error');
    return false;
  }
  if (result.status === 'queued') {
    // 排队时也要保存 token，用于轮询会话状态
    if (result.token) {
      saveToken(result.token, result.user || { username: username, is_admin: false, is_guest: false }, null);
    }
    showQueue(result);
    startQueueCheck();
    return false;
  }
  if (result.token) {
    saveToken(result.token, result.user, result.quota);
    window.location.href = result.user.is_admin ? '/admin' : '/game';
    return false;
  }
  showAlert('登录失败，请重试', 'error');
  return false;
}

// ===== 注册 =====
async function doRegister(event) {
  event.preventDefault();
  var btn = document.getElementById('registerBtn');
  var pwd1 = document.getElementById('regPassword').value;
  var pwd2 = document.getElementById('regPassword2').value;
  if (pwd1 !== pwd2) {
    showAlert('两次密码输入不一致', 'error');
    return false;
  }
  setBtnLoading(btn, true);
  var username = document.getElementById('regUsername').value.trim();
  var result = await apiCall('/api/auth/register', { username: username, password: pwd1 });
  setBtnLoading(btn, false);

  if (result.error) {
    showAlert(result.error, 'error');
    return false;
  }
  if (result.status === 'queued') {
    if (result.token) {
      saveToken(result.token, result.user || { username: username, is_admin: false, is_guest: false }, null);
    }
    showQueue(result);
    startQueueCheck();
    return false;
  }
  if (result.token) {
    saveToken(result.token, result.user, result.quota);
    showAlert('注册成功，正在进入...', 'info');
    setTimeout(function() {
      window.location.href = '/game';
    }, 800);
    return false;
  }
  showAlert('注册失败，请重试', 'error');
  return false;
}

// ===== 游客登录 =====
async function doGuestLogin() {
  var btn = document.getElementById('guestBtn');
  setBtnLoading(btn, true);
  var result = await apiCall('/api/auth/guest', {});
  setBtnLoading(btn, false);

  if (result.error) {
    showAlert(result.error, 'error');
    return;
  }
  if (result.status === 'queued') {
    if (result.token) {
      saveToken(result.token, result.user || { username: '游客', is_admin: false, is_guest: true }, null);
    }
    showQueue(result);
    startQueueCheck();
    return;
  }
  if (result.token) {
    saveToken(result.token, result.user, result.quota);
    window.location.href = '/game';
  }
}

// ===== 排队 =====
var queueTimer = null;
function showQueue(result) {
  var overlay = document.getElementById('queueOverlay');
  var text = document.getElementById('queueText');
  var sub = document.getElementById('queueSub');
  overlay.classList.add('show');
  text.textContent = result.message || '正在排队...';
  sub.textContent = '预计等待 ' + (result.estimated_wait || 0) + ' 分钟';
}

function startQueueCheck() {
  // 每 5 秒检查会话状态
  queueTimer = setInterval(checkSessionStatus, 5000);
}

async function checkSessionStatus() {
  var token = localStorage.getItem('taiwu_token');
  if (!token) {
    clearInterval(queueTimer);
    return;
  }
  try {
    var resp = await fetch('/api/auth/session', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    var result = await resp.json();
    if (result.status === 'active') {
      clearInterval(queueTimer);
      document.getElementById('queueOverlay').classList.remove('show');
      showAlert('已进入，正在跳转...', 'info');
      setTimeout(function() {
        var user = JSON.parse(localStorage.getItem('taiwu_user') || '{}');
        window.location.href = user.is_admin ? '/admin' : '/game';
      }, 500);
    } else if (result.status === 'queued') {
      var text = document.getElementById('queueText');
      var sub = document.getElementById('queueSub');
      text.textContent = result.message || '正在排队...';
      sub.textContent = '前方还有 ' + (result.position ? result.position - 1 : 0) + ' 人，请耐心等待';
    } else {
      // expired，回到登录
      clearInterval(queueTimer);
      document.getElementById('queueOverlay').classList.remove('show');
      showAlert('会话已过期，请重新登录', 'warning');
      localStorage.removeItem('taiwu_token');
    }
  } catch(e) { /* ignore */ }
}

// ===== 自动登录检查 =====
(function autoLogin() {
  var token = localStorage.getItem('taiwu_token');
  if (!token) return;
  // 验证 token 是否还有效
  fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data && data.id && !data.error) {
        window.location.href = data.is_admin ? '/admin' : '/game';
      } else {
        localStorage.removeItem('taiwu_token');
      }
    })
    .catch(function() {});
})();
</script>
</body>
</html>
